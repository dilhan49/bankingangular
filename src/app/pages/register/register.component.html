<div class="container-fluid card login-container">

    <h3>Create an account</h3>

    <div class="mb-3">
      <label for="exampleInputEmail1">Firstname</label>
      <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter firstname">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Lastname</label>
      <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter lastname">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Email adress </label>
      <input type="email" class="form-control" id="exampleInputPassword1" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Password</label>
      <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Repeat password</label>
      <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
    </div>

    <div class="d-flex justify-content-between mb-3">
      <button type="button" class="btn btn-primary">
        <i class="fas fa-user-plus "></i>
        <span>Create an account</span>
      </button>
      <div>
      Already have an account?
      <button (click)="login()" type="button" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login</span>
      </button>
    </div>
    </div>


</div>
