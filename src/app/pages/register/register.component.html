<div class="container-fluid card login-container">

    <h3>Create an account</h3>

    <div *ngIf="errorMessages.length" class="alert alert-danger" role="alert">
      <p *ngFor="let msg of errorMessages">{{msg}}</p>
    </div>

    <div class="mb-3">
      <label for="exampleInputEmail1">Firstname</label>
      <input [(ngModel)]="userDto.firstname" type="text" class="form-control" id="firstname" aria-describedby="emailHelp" placeholder="Enter firstname">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Lastname</label>
      <input [(ngModel)]="userDto.lastname" type="text" class="form-control" id="lastname" placeholder="Enter lastname">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Email adress </label>
      <input [(ngModel)]="userDto.email" type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Password</label>
      <input [(ngModel)]="userDto.password" type="password" class="form-control" id="password" placeholder="Password">
    </div>
    <!-- <div class="mb-3">
      <label for="exampleInputPassword1">Repeat password</label>
      <input type="password" class="form-control" id="repeat-password" placeholder="Password">
    </div> -->

    <div class="d-flex justify-content-between mb-3">
      <button (click)="register()" type="button" class="btn btn-primary">
        <i class="fas fa-user-plus "></i>
        <span>Create an account</span>
      </button>
      <div>
      Already have an account?
      <button (click)="login()" type="button" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login</span>
      </button>
    </div>
    </div>


</div>
