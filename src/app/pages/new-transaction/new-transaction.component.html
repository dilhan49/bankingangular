<div class="p-3">
  <h2>New Transaction</h2>
<div class="card p-3">
  <h3>Your account balance : 21560 euros</h3>
  <div class="mb-3">
      <label for="transactionType">Transaction Type</label>
      <select class="form-control" id="transactionType">
        <option value="">Select Transaction Type</option>
        <option value="debit">Debit</option>
        <option value="credit">Credit</option>
      </select>
    </div>
  <div class="mb-3">
      <label for="contact">Choose a contact</label>
      <select class="form-control" id="contact">
        <option value="">Select a contact</option>
        <option value="1">John Doe</option>
        <option value="2">Jane Smith</option>
      </select>
    </div>
  <div class="mb-3">
      <label for="amount">Amount</label>
      <input type="number" class="form-control" id="amount" aria-describedby="emailHelp" placeholder="Enter amount">
    </div>
  <div class="mb-3">
      <label for="iban">IBAN</label>
      <input type="text" class="form-control" id="iban" aria-describedby="emailHelp" placeholder="Enter IBAN">
    </div>
    <div class="d-flex flex-row justify-content-end">
      <button type="button" class="btn btn-link"><em class="fas fa-trash"></em> Cancel</button>
      <button type="button" class="btn btn-danger me-2"><em class="fas fa-save"></em> Save</button>

    </div>
</div>
</div>
