<div class="container-fluid card login-container">

    <h3>Login</h3>
      <div *ngIf="errorMessages.length" class="alert alert-danger" role="alert">
        <p *ngFor="let msg of errorMessages">{{msg}}</p>
      </div>

    <div class="mb-3">
      <label for="exampleInputEmail1">Email address</label>
      <input [(ngModel)]="authenticationRequest.email" type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">Password</label>
      <input [(ngModel)]="authenticationRequest.password" type="password" class="form-control" id="password" placeholder="Password">
    </div>

    <div class="d-flex justify-content-between mb-3">
      <button type="button" class="btn btn-primary" (click)="login()">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login</span>
      </button>
      <div>
      Don't have an account?
      <button (click)="register()" type="button" class="btn btn-primary">
        <i class="fas fa-user-plus"></i>
        <span>Register</span>
      </button>
    </div>
    </div>


</div>
