<div class="p-3">
  <h2>My Profile</h2>
  <div class="d-flex flex-row justify-between">
    <div class="card p-3 col-6 me-2">
      <h3>Personal Information</h3>
    <div class="mb-3">
        <label for="exampleInputEmail1">Firstname</label>
        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter firstname">
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1">Lastname</label>
        <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter lastname">
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1">Email</label>
        <input type="email" class="form-control" id="exampleInputPassword1" aria-describedby="emailHelp" placeholder="Enter email">
      </div>

    </div>


  <div class="card p-3 col-6">
    <h3>Address</h3>
  <div class="mb-3">
      <label for="exampleInputEmail1">Street</label>
      <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter street">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">House Number</label>
      <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter house number">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1">City</label>
      <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter city">
    </div>

</div>
</div>
    <div class="d-flex flex-row justify-content-end">
      <button type="button" class="btn btn-link"><em class="fas fa-trash"></em> Cancel</button>
      <button type="button" class="btn btn-danger me-2"><em class="fas fa-save"></em> Save</button>

    </div>
</div>
